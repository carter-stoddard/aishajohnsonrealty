<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aisha Johnson Realty</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="mobile-container">
      <header class="banner-section">
        <div class="banner-image" style="background-image: url('./Banner-Background.png');"></div>
        <div class="profile-container">
          <img src="./Aisha-Johnson-Realty-PFP.png" alt="Aisha Johnson" class="profile-img" />
        </div>
      </header>

      <main class="content-section">
        <img src="./Aisha-Johnson-Realty-Logo.png" alt="Aisha Johnson Realty Logo" class="brand-logo" />

        <div class="social-icons">
          <a href="https://instagram.com/aishajohnsonrealty" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
          <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="mailto:amjrebroker@outlook.com" aria-label="Email"><i class="far fa-envelope"></i></a>
          <a href="tel:+13106212219" aria-label="Phone"><i class="fas fa-phone"></i></a>
        </div>

        <div class="form-container">
          <h2 class="form-heading">Ready to Make a Move?</h2>
          <form id="lead-form" class="contact-form" novalidate>
            <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
            <div class="form-field">
              <input type="text" name="first_name" placeholder="First Name" data-hint="Beautiful name ✨" required>
              <span class="field-hint"></span>
            </div>
            <div class="form-field">
              <input type="text" name="last_name" placeholder="Last Name" data-hint="Love it — nice to meet you" required>
              <span class="field-hint"></span>
            </div>
            <div class="form-field">
              <input type="email" name="email" placeholder="Email" data-hint="Perfect, I'll be in touch soon" required>
              <span class="field-hint"></span>
            </div>
            <div class="form-field">
              <input type="tel" name="phone" placeholder="Phone" data-hint="Great — I'll give you a call">
              <span class="field-hint"></span>
            </div>
            <div class="form-field">
              <select name="interest" required>
                <option value="" disabled selected>I'm Interested In...</option>
                <option value="Buying">Buying</option>
                <option value="Selling">Selling</option>
                <option value="Both">Both</option>
              </select>
            </div>
            <div class="form-field">
              <textarea name="notes" placeholder="Any Notes?" data-hint="Thanks for sharing — can't wait to help" rows="3"></textarea>
              <span class="field-hint"></span>
            </div>
            <button type="submit" class="btn-submit">LET'S CONNECT</button>
            <p class="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </main>

      <div class="success-modal" id="success-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="success-modal-card">
          <div class="success-icon" aria-hidden="true">
            <svg viewBox="0 0 52 52" width="52" height="52">
              <circle cx="26" cy="26" r="24" fill="none" stroke="#6b4765" stroke-width="2"/>
              <path d="M14 27 L23 35 L38 18" fill="none" stroke="#6b4765" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h3 id="modal-title" class="success-title">Request Received</h3>
          <p class="success-message">Thank you — Aisha will personally respond within 24 hours.</p>
          <button type="button" class="success-close" id="modal-close">CLOSE</button>
        </div>
      </div>

      <footer class="footer">
        <p class="footer-main">BROKER ASSOCIATE · TRILLION REAL ESTATE</p>
        <p class="footer-sub">REALTOR® | DRE # 01769136</p>
      </footer>
    </div>
    <script>
      document.querySelectorAll('.form-field input, .form-field textarea').forEach(el => {
        const hint = el.parentElement.querySelector('.field-hint');
        const message = el.getAttribute('data-hint');
        if (!hint || !message) return;
        el.addEventListener('input', () => {
          hint.textContent = el.value.trim() ? message : '';
          hint.classList.toggle('show', !!el.value.trim());
        });
      });

      const form = document.getElementById('lead-form');
      const status = form.querySelector('.form-status');
      const submitBtn = form.querySelector('.btn-submit');
      const modal = document.getElementById('success-modal');
      const modalClose = document.getElementById('modal-close');

      function openModal() {
        modal.hidden = false;
        requestAnimationFrame(() => modal.classList.add('show'));
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        modal.classList.remove('show');
        document.body.style.overflow = '';
        setTimeout(() => { modal.hidden = true; }, 300);
      }

      modalClose.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !modal.hidden) closeModal();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = '';
        status.classList.remove('error', 'success');

        const data = Object.fromEntries(new FormData(form).entries());

        if (!data.first_name || !data.last_name || !data.email || !data.interest) {
          status.textContent = 'Please fill in all required fields.';
          status.classList.add('error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'SENDING...';

        try {
          const response = await fetch('/api/send-lead', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });

          if (!response.ok) throw new Error('Request failed');

          form.reset();
          document.querySelectorAll('.field-hint').forEach(h => {
            h.textContent = '';
            h.classList.remove('show');
          });
          status.textContent = '';
          submitBtn.disabled = false;
          submitBtn.textContent = "LET'S CONNECT";
          openModal();
        } catch {
          status.textContent = 'Something went wrong. Please try again or call directly.';
          status.classList.add('error');
          submitBtn.disabled = false;
          submitBtn.textContent = "LET'S CONNECT";
        }
      });
    </script>
  </body>
</html>
